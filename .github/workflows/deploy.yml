name: 🚀 Deploy to Contabo VPS

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:   # يتيح التشغيل اليدوي من GitHub UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # لا نلغي deploy جارٍ — ننتظر انتهاءه

jobs:
  # ─── Job 1: CI — Build + Test ────────────────────────────────────────────────
  ci:
    name: ✅ Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test --run

      - name: Production build
        run: NODE_ENV=production pnpm run build

      - name: Verify build output
        run: |
          test -f dist/index.js || (echo "❌ dist/index.js not found" && exit 1)
          test -d dist/public   || (echo "❌ dist/public not found" && exit 1)
          echo "✅ Build output verified"

  # ─── Job 2: Deploy — SSH to VPS ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci          # يعمل فقط بعد نجاح CI
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          VPS_PORT="${{ secrets.VPS_PORT }}"
          VPS_PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$VPS_PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          APP_DIR:  ${{ secrets.APP_DIR }}
        run: |
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" bash -s << 'ENDSSH'
            set -euo pipefail

            APP_DIR="${APP_DIR:-/var/www/takamol}"
            cd "$APP_DIR"

            echo "📦 Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            echo "🔧 Running deploy script..."
            bash deploy/deploy.sh

            echo "✅ Deploy complete on VPS"
          ENDSSH

      - name: Health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "🩺 Running health check..."
          sleep 10

          # محاولة health check عبر HTTP (إذا كان الدومين مضبوطاً)
          if [ -n "${{ secrets.APP_URL }}" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "${{ secrets.APP_URL }}/api/trpc/auth.me" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
            else
              echo "⚠️  Health check returned HTTP $HTTP_CODE — checking PM2 status..."
            fi
          fi

          # التحقق من PM2 على السيرفر
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "pm2 describe takamol | grep -E 'status|pid' | head -5"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"

          # Telegram notification (if TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are set)
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_OWNER_CHAT_ID }}" ]; then
            MSG="%E2%9D%8C+Deploy+FAILED%0ABranch:+${{ github.ref_name }}%0ACommit:+${{ github.sha }}%0ABy:+${{ github.actor }}"
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_OWNER_CHAT_ID }}&text=${MSG}" > /dev/null
          fi

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment SUCCEEDED for commit ${{ github.sha }}"

          # Telegram notification on success
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_OWNER_CHAT_ID }}" ]; then
            MSG="%E2%9C%85+Deploy+SUCCESS%0ABranch:+${{ github.ref_name }}%0ACommit:+${{ github.sha }}%0ABy:+${{ github.actor }}"
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_OWNER_CHAT_ID }}&text=${MSG}" > /dev/null
          fi
