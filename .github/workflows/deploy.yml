name: CI/CD — Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:          # يسمح بالتشغيل اليدوي من GitHub UI

concurrency:
  group: production-deploy
  cancel-in-progress: false   # لا تلغي deploy جارٍ — انتظر حتى ينتهي

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: CI — Install + Test + Build
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: CI (Install → Test → Build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit
        continue-on-error: false

      - name: Run tests
        run: pnpm test --run
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Build production bundle
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          test -f dist/index.js || (echo "ERROR: dist/index.js missing" && exit 1)
          test -d dist/public   || (echo "ERROR: dist/public missing" && exit 1)
          echo "✅ Build artifacts verified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy — SSH to VPS
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 20
    environment:
      name: production
      url: https://takamolestates.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} \
            ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -p ${{ secrets.VPS_PORT || '22' }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.APP_DIR }} && bash deploy/deploy.sh"
        env:
          DEPLOY_COMMIT: ${{ github.sha }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_ACTOR: ${{ github.actor }}

      - name: Post-deploy health check
        run: |
          echo "Waiting 10s for app to stabilize..."
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://takamolestates.com/api/health 2>/dev/null || echo "000")
          echo "Health check HTTP code: $HTTP_CODE"
          if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "204" ]]; then
            echo "✅ Health check passed"
          else
            echo "⚠️ Health check returned $HTTP_CODE — checking fallback..."
            HTTP_CODE2=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              https://takamolestates.com 2>/dev/null || echo "000")
            echo "Fallback HTTP code: $HTTP_CODE2"
            if [[ "$HTTP_CODE2" == "200" || "$HTTP_CODE2" == "301" || "$HTTP_CODE2" == "302" ]]; then
              echo "✅ Fallback health check passed"
            else
              echo "❌ Health check FAILED — HTTP $HTTP_CODE2"
              exit 1
            fi
          fi

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deploy successful!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy FAILED!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Check GitHub Actions logs for details."
