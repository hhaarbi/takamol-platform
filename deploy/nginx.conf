# ============================================================
# Nginx Configuration — تكامل Real Estate Platform
# Target: Ubuntu 22.04 LTS (Contabo VPS or any VPS)
# ============================================================
# BEFORE USE: Replace YOUR_DOMAIN with your actual domain.
#
# Usage:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/takamol
#   sudo sed -i 's/YOUR_DOMAIN/takamol.sa/g' /etc/nginx/sites-available/takamol
#   sudo ln -s /etc/nginx/sites-available/takamol /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# After setup, get SSL certificate:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
#
# GitHub Actions auto-deploys on push to main branch.
# Required secrets: VPS_HOST, VPS_USER, VPS_PORT, VPS_SSH_KEY, APP_DIR, APP_URL
# ============================================================

# ─── Rate Limiting Zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;

# ─── HTTP → HTTPS Redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://YOUR_DOMAIN$request_uri;
    }
}

# ─── www → non-www Redirect ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.YOUR_DOMAIN;

    # SSL Certificates (managed by certbot — filled automatically)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    return 301 https://YOUR_DOMAIN$request_uri;
}

# ─── Main HTTPS Server ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ─── SSL Certificates (Let's Encrypt / certbot) ───────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # ─── SSL Hardening ────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Client Settings ──────────────────────────────────────
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # ─── Auth Endpoints (strict rate limit) ───────────────────
    # Covers both Manus OAuth (legacy) and standalone auth
    location ~ ^/api/(oauth|trpc/standaloneAuth\.) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /api/oauth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ─── API Routes (Node.js backend) ─────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # ─── Static Frontend (React SPA) ──────────────────────────
    # After `pnpm build`, static files are in dist/public/
    location / {
        limit_req zone=general burst=100 nodelay;
        root /var/www/takamol/dist/public;
        index index.html;
        # SPA fallback: serve index.html for all non-file routes
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS/CSS/images) — 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Don't cache HTML (SPA entry point)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }
    }

    # ─── Block sensitive files ────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|log|sql|sh|bak|config)$ {
        deny all;
        return 404;
    }

    # ─── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/takamol-access.log combined;
    error_log  /var/log/nginx/takamol-error.log warn;
}
