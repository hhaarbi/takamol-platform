# ============================================================
# Nginx Configuration — Real Estate Bot (تكامل)
# Ubuntu 22.04 LTS
# ============================================================
# الاستخدام:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/realestate-bot
#   sudo ln -s /etc/nginx/sites-available/realestate-bot /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# بعد الإعداد، احصل على SSL:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ============================================================

# ─── Rate Limiting Zones ──────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;

# ─── HTTP → HTTPS Redirect ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─── SSL Certificates (Let's Encrypt / certbot) ───────
    # يتم تعبئة هذه المسارات تلقائياً بعد تشغيل certbot:
    #   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # ─── SSL Hardening ────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Gzip Compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Client Settings ──────────────────────────────────
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # ─── Auth Endpoints (strict rate limit) ───────────────
    location /api/oauth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ─── API Routes (Node.js backend) ─────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # ─── Static Frontend (React SPA) ──────────────────────
    # ملاحظة: بعد pnpm build، الملفات تكون في dist/public
    location / {
        limit_req zone=general burst=100 nodelay;
        root /var/www/realestate-bot/dist/public;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS/CSS/images) — 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Don't cache HTML (SPA entry point)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }
    }

    # ─── Block sensitive files ────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|log|sql|sh|bak|config)$ {
        deny all;
        return 404;
    }

    # ─── Logs ─────────────────────────────────────────────
    access_log /var/log/nginx/realestate-bot.access.log combined;
    error_log  /var/log/nginx/realestate-bot.error.log warn;
}
